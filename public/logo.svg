<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)"/>

  <!-- Claw marks -->
  <path d="M 50 60 L 60 120 L 70 60" fill="white" opacity="0.9"/>
  <path d="M 85 50 L 95 125 L 105 50" fill="white" opacity="0.9"/>
  <path d="M 120 55 L 130 120 L 140 55" fill="white" opacity="0.9"/>

  <!-- Control panel base -->
  <rect x="40" y="140" width="120" height="30" rx="5" fill="white" opacity="0.9"/>

  <!-- Control panel dots -->
  <circle cx="65" cy="155" r="6" fill="#3b82f6"/>
  <circle cx="100" cy="155" r="6" fill="#10b981"/>
  <circle cx="135" cy="155" r="6" fill="#f59e0b"/>
</svg>
