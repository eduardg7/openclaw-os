# OpenClaw OS - Docker Compose
# Quick deployment with Docker

services:
  openclaw-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-os
    ports:
      - "3000:3000"
    environment:
      # OpenClaw Gateway URL (change if different)
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:3100}
      # OpenClaw data directory (mounted volume)
      - OPENCLAW_DATA_DIR=/data
      - NODE_ENV=production
    volumes:
      # Mount OpenClaw data directory for access to agents/config
      - ${OPENCLAW_DATA_DIR:-~/.openclaw}:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Required for accessing host services on macOS/Windows
    extra_hosts:
      - "host.docker.internal:host-gateway"
